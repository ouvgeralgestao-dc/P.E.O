server {
    listen 80;
    server_name ogmanalytics.duquedecaxias.rj.gov.br;

    # Servir frontend estático
    root /home/administrator/PEO/frontend/dist;
    index index.html;

    # Logs
    access_log /var/log/nginx/peo_access.log;
    error_log /var/log/nginx/peo_error.log;

    # Servir arquivos estáticos do frontend
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy para backend na porta 6001
    location /peo/api/ {
        proxy_pass http://localhost:6001/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Otimizações para arquivos estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
